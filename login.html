<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-image: url(Images/Bcgi.png);
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      z-index: -1;
      font-family: "Poppins";
    }

    #login {
      margin-top: 17%;
      width: 250px;
      height: 300px;
      border: 1px solid gray;
      padding: 2rem;
      border-radius: 7px;
      box-shadow: 0 0 15px 5px grey;
    }

    #login div {
      display: flex;
      flex-direction: column;
      gap: 25px;
      justify-content: center;
      align-items: center;
    }

    #login div input,
    button {
      border: 1px solid gray;
      width: 100%;
      height: 30px;
      border-radius: 7px;
    }

    #login div button {
      position: relative;
      top: 20px;
      background-color: #3b83f6bb;
      color: white;
      cursor: pointer;
    }

    #login div a {
      position: relative;
      color: #3b82f6;
      left: 70px;
      cursor: pointer;
      text-decoration: none;
    }

    @media(max-width:768px) {

      #body {
        flex-direction: column;
        text-align: center;
      }

      #head {
        flex-direction: column;
        gap: 20px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }

      .stats {
        flex-direction: column;
      }

      #features {
        flex-direction: column;
        align-items: center;
      }

    }
  </style>
</head>

<body>
  <div id="login">
    <div>
      <h2>User Login</h2>
      <input id="loginName" placeholder="Username" />
      <input id="loginPass" type="password" placeholder="Password" />
      <a id="forgot">Forgot password</a>
      <button class="login">Login</button>
    </div>
  </div>

  <script>
    document.querySelector(".login").addEventListener("click", () => {
      const nameInput = document.querySelector("#loginName");
      const passInput = document.querySelector("#loginPass");

      const name = nameInput.value.trim();
      const pass = passInput.value;

      if (name === "" || pass === "") {
        alert("Please enter valid name and password");
        return;
      }
      if (name === "admin" && pass === "1234") {

        localStorage.setItem("isAdmin", true);

        window.location = "admin.html";

        return;

      }
      let users = JSON.parse(localStorage.getItem("users")) || [];
      let user = users.find((u) => u.name === name && u.pass === pass);

      if (user) {
        localStorage.setItem("currentUser", user.name);
        alert("Login successful!");
        window.location.href = "user-dashboard.html";
      } else {
        alert("Invalid username or password");
        passInput.value = "";
        passInput.style.borderColor = "red";
      }
    });
    document.querySelector("#forgot").addEventListener("click", () => {
      alert("Please Register again with new Username and Password");

      setTimeout(() => {
        window.location.href = "register.html";
      }, 100);
    });
  </script>
</body>

</html>
