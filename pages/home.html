<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    body {
      font-family: 'Poppins';
    }

    .dashboard-home {
      padding: 20px;
    }

    .welcome-card {
      background: linear-gradient(to right, #6366f1, #8b5cf6);
      color: white;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .recent-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    @media(max-width:768px) {

      #body {
        flex-direction: column;
        text-align: center;
      }

      #head {
        flex-direction: column;
        gap: 20px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }

      .stats {
        flex-direction: column;
      }

      #features {
        flex-direction: column;
        align-items: center;
      }

    }
  </style>
</head>

<body>
  <div class="dashboard-home">
    <div class="welcome-card">
      <h1 id="welcomeText"></h1>
      <p>Together we improve our community 🚀</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h2 id="totalCount">0</h2>
        <p>Total Complaints</p>
      </div>

      <div class="stat-card">
        <h2 id="pendingCount">0</h2>
        <p>Pending</p>
      </div>

      <div class="stat-card">
        <h2 id="resolvedCount">0</h2>
        <p>Resolved</p>
      </div>
    </div>

    <div class="recent-section">
      <h2>Recent Complaints</h2>

      <div id="recentComplaints"></div>
    </div>
  </div>
  <script>
    let currentUser = localStorage.getItem("currentUser");

    document.getElementById("welcomeText").innerText =
      "Welcome " + currentUser + " 👋";

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];


    let userComplaints = complaints.filter((c) => c.user === currentUser);


    let total = userComplaints.length;

    let pending = userComplaints.filter((c) => c.status === "Pending").length;

    let resolved = userComplaints.filter(
      (c) => c.status === "Resolved",
    ).length;


    document.getElementById("totalCount").innerText = total;
    document.getElementById("pendingCount").innerText = pending;
    document.getElementById("resolvedCount").innerText = resolved;


    let recentDiv = document.getElementById("recentComplaints");

    userComplaints
      .slice(-3)
      .reverse()
      .forEach((c) => {
        recentDiv.innerHTML += `
    <div class="card">
      <h3>${c.issue}</h3>
      <p>Status: ${c.status}</p>
      <p>Location: ${c.location}</p>
    </div>
  `;
      });
  </script>
</body>

</html>
