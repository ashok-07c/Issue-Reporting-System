<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    body {
      font-family: 'Poppins';
    }

    .status-page {
      padding: 20px;
    }

    .status-header {
      margin-bottom: 20px;
    }

    .complaint-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

      gap: 20px;
    }

    .complaint-card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .status {
      padding: 5px 10px;
      border-radius: 20px;
      color: white;
      font-size: 12px;
    }

    .pending {
      background: #f59e0b;
    }

    .resolved {
      background: #10b981;
    }

    .date {
      margin-top: 15px;
      color: gray;
      font-size: 12px;
    }

    .empty-card {
      background: white;
      padding: 40px;
      text-align: center;
      border-radius: 15px;
    }

    @media(max-width:768px) {

      #body {
        flex-direction: column;
        text-align: center;
      }

      #head {
        flex-direction: column;
        gap: 20px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }

      .stats {
        flex-direction: column;
      }

      #features {
        flex-direction: column;
        align-items: center;
      }

    }
  </style>
</head>

<body>
  <div class="status-page">
    <div class="status-header">
      <h1>My Complaints</h1>
      <p>Track all your submitted complaints</p>
    </div>

    <div id="complaintContainer" class="complaint-grid"></div>
  </div>

  <script>
    if (!localStorage.getItem("currentUser")) {
      alert("Please login first");
      window.location = "login.html";
    }
    let currentUser = localStorage.getItem("currentUser");

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
    let userComplaints = complaints.filter((c) => c.user === currentUser);

    let container = document.getElementById("complaintContainer");


    if (userComplaints.length === 0) {
      container.innerHTML = `
    <div class="empty-card">
      <h2>No complaints found</h2>
      <p>Start by reporting an issue 🚀</p>
    </div>
  `;
    }

    /* Display complaints */
    userComplaints.reverse().forEach((c) => {
      let statusClass = c.status === "Resolved" ? "resolved" : "pending";

      container.innerHTML += `

    <div class="complaint-card">

      <div class="card-top">
        <h2>${c.issue}</h2>

        <span class="status ${statusClass}">
          ${c.status}
        </span>
      </div>

      <p><strong>Location:</strong> ${c.location}</p>

      <p><strong>Description:</strong>
      ${c.description}</p>

      <p><strong>ID:</strong> ${c.id}</p>

      <p class="date">${c.date}</p>

    </div>

  `;
    });
  </script>

  <script></script>
</body>

</html>
