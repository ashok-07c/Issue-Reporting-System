<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard</title>
</head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

  body {
    font-family: 'Poppins';
  }

  .dashboard {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 240px;
    background: #0f172a;
    color: white;
    padding: 20px;
    transition: 0.3s;
  }

  .sidebar a {
    display: block;
    color: white;
    margin: 20px 0;
    text-decoration: none;
  }

  .main-content {
    flex: 1;
    background: #f1f5f9;
  }

  .topbar {
    background: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .menu-btn {
    font-size: 22px;
    border: none;
    background: none;
    cursor: pointer;
  }

  iframe {
    position: relative;
    top: 0px;
    width: 100%;
    height: calc(100vh - 60px);
    border: none;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: absolute;
      left: -240px;
      top: 0;
      height: 100%;
      z-index: 1000;
    }

    .sidebar.active {
      left: 0;
    }
  }

  .sidebar {
    width: 240px;
    background: #0f172a;
    color: white;
    padding: 20px;
    transition: 0.3s;
  }

  .sidebar.hide {
    transform: translateX(-260px);
  }

  @media(max-width:768px) {

    #body {
      flex-direction: column;
      text-align: center;
    }

    #head {
      flex-direction: column;
      gap: 20px;
    }

    .nav {
      flex-wrap: wrap;
      justify-content: center;
    }

    .stats {
      flex-direction: column;
    }

    #features {
      flex-direction: column;
      align-items: center;
    }

  }
</style>

<body>
  <div class="dashboard">
    <div class="sidebar" id="sidebar">
      <h2>Citizen Panel</h2>
      <a href="#" onclick="loadPage('pages/home.html')">Home</a>
      <a href="#" onclick="loadPage('pages/report.html')"> Report Issue </a>

      <a href="#" onclick="loadPage('pages/status.html')"> My Complaints </a>

      <a href="#" onclick="logout()"> Logout </a>
    </div>

    <div class="main-content">
      <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>

        <h3>User Dashboard</h3>
      </div>

      <iframe id="contentFrame" src="pages/home.html"> </iframe>
    </div>
  </div>
  <script>
    if (!localStorage.getItem("currentUser")) {
      alert("Please login first");
      window.location = "user-login.html";
    }
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("hide");
    }
    function logout() {
      localStorage.removeItem("currentUser");

      window.location = "index.html";
    }

    function loadPage(page) {
      document.getElementById("contentFrame").src = page;
    }
  </script>
</body>

</html>
