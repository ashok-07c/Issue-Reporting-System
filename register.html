<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Registration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-image: url(Images/Bcgi.png);
      background-position: left;
      background-repeat: no-repeat;
      background-size: cover;
      z-index: -1;
      font-family: "Poppins";
    }

    #sign-up {
      margin-top: 17%;
      width: 250px;
      height: 300px;
      border: 1px solid gray;
      padding: 2rem;
      border-radius: 7px;
      box-shadow: 0 0 15px 5px grey;
    }

    #sign-up div {
      display: flex;
      flex-direction: column;
      gap: 25px;
      justify-content: center;
      align-items: center;
    }

    #sign-up div input,
    button {
      border: 1px solid gray;
      width: 100%;
      height: 30px;
      border-radius: 7px;
    }

    #sign-up div button {
      position: relative;
      top: 40px;
      cursor: pointer;
      background-color: #3b83f6bb;
      color: white;
    }

    #sign-up div a {
      position: relative;
      color: #3b82f6;
      left: 70px;
      cursor: pointer;
      text-decoration: none;
    }

    @media(max-width:768px) {

      #body {
        flex-direction: column;
        text-align: center;
      }

      #head {
        flex-direction: column;
        gap: 20px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }

      .stats {
        flex-direction: column;
      }

      #features {
        flex-direction: column;
        align-items: center;
      }

    }
  </style>
</head>

<body>
  <div id="sign-up">
    <div>
      <h2>User Registration</h2>

      <input type="text" id="regName" placeholder="Name" />
      <input type="password" id="regPass" placeholder="Password" />
      <span id="passError"></span>
      <button id="register">Register</button>
    </div>
  </div>
  <script>
    document.querySelector("#register").addEventListener("click", () => {
      let name = document.querySelector("#regName").value.trim();
      let passInput = document.querySelector("#regPass");
      let pass = passInput.value;
      let errorMsg = document.querySelector("#passError");

      if (name === "" || pass === "") {
        alert("Please enter valid name and password");
        return;
      }

      if (pass.length < 8) {
        passInput.style.borderColor = "red";
        errorMsg.textContent = "Password must be at least 8 characters";
        errorMsg.style.color = "red";
        return;
      }

      let users = JSON.parse(localStorage.getItem("users")) || [];
      users.push({ name, pass });
      localStorage.setItem("users", JSON.stringify(users));

      alert("Registered");
      document.querySelector("#regName").value = "";
      document.querySelector("#regPass").value = "";
      passInput.style.borderColor = "";
      errorMsg.textContent = "";
      window.location.href = "login.html";
    });
  </script>
</body>

</html>
